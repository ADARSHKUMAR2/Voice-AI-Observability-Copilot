name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - Azure_CI_CD  
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - Azure_CI_CD  

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
          
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # 🔐 Security credentials link pointing directly to your repository token secret
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/frontend"   # Points directly to your index.html project folder
          api_location: ""            # Optional API tracking parameter (handled by Azure App Service backend)
          output_location: ""         # Left blank for uncompiled vanilla HTML/Tailwind/Vue 3 builds

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"